services:
  - type: web
    name: gc-inventory-hub
    runtime: node
    repo: https://github.com/yourusername/gc-server
    buildCommand: cd backend && npm install && npm run build && cp -r src/db/migrations dist/db/migrations && cd ../frontend && npm install && npm run build
    startCommand: cd backend && node dist/db/migrate.js && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gc-inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: QBO_CLIENT_ID
        sync: false
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_REDIRECT_URI
        sync: false
      - key: QBO_ENVIRONMENT
        value: production
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_ENVIRONMENT
        value: production
      - key: SQUARE_WEBHOOK_SIGNATURE_KEY
        sync: false
      - key: SQUARE_APP_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Support / contact form (Resend)
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_FROM_EMAIL
        value: hub@arkfinancialservices.com
      - key: SUPPORT_FROM_NAME
        value: Ark Support
      - key: SUPPORT_TO_EMAIL
        value: staff@arkfinancialservices.com
      - key: CLIENT_NAME
        value: Goodman Classic

databases:
  - name: gc-inventory-db
    plan: starter
